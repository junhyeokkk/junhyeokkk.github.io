<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .responsive {
            background: #f00;
        }
        body{
            background: #333;
        }
        .responsive span{
            display: none;
        }
        .res02{
            display: flex;
            flex-direction: column;
            gap: 20px ;
            width: auto;
            margin: 0 auto;

        }
        .res02 figure{
            flex: 1;
            background: #f00;
        }

        nav {
            position: fixed;
            top: 0;
            left: -100%;
            width: calc( 100% -90px);
            height: 100vh;
            padding:50px 15px;
            background-color: #fff;
            transition: 0.5s;

        }
        nav.on{
            left:0;
        }
        nav>ul{
            display: flex;
            justify-content: center;
            list-style: none;
            line-height: 40px;
        }
        nav>ul a{
            display: block;
            padding: 0 15px;
            color: #333;
            border-bottom: 1px solid #ddd;
        }
        .mopen{
            display: none;
            position: fixed;
            top: 30px;

        }
        .mopen::before{
            content: "O";
        }
        .mopen.on::before{
            content: "X";
        }
        @media(max-width: 768px) {


            .responsive {
                background: #369;
            }
            .responsive span{
                display: block;
            }
        }
        @media (max-width: 500px){
            .responsive{
                background: #369;
            }
        }
    </style>
    .o
</head>

<body>
    <div class="responsive">
        <h1>
            <span>선택장애있음</span></h1>
    </div>
    <div class="res02">
        <figure>01</figure>
        <figure>01</figure>
        <figure>01</figure>
    </div>
    <div class="mopen">
        
    </div>
    <script>
        document.querySelector('.mopen').addEventListener('click',function(){
            document.querySelector('nav').classList.toggle('on')
            this.classList.toggle('on');
        })
    </script>

</body>

</html>
